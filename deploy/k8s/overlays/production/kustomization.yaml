apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: whitehelmet-production

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: ConfigMap
      name: backend-config
    patch: |-
      - op: replace
        path: /data/ENVIRONMENT
        value: production
      - op: replace
        path: /data/CORS_ORIGINS
        value: '["https://whitehelmet.example.com"]'
  - target:
      kind: HorizontalPodAutoscaler
      name: backend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 12
  - target:
      kind: PersistentVolumeClaim
      name: uploads-pvc
    patch: |-
      - op: replace
        path: /spec/resources/requests/storage
        value: 50Gi
