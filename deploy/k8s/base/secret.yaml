apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  labels:
    app: whitehelmet
type: Opaque
# Values must be base64 encoded. Replace placeholders before applying.
# echo -n 'value' | base64
stringData:
  DB_USER: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  ANTHROPIC_API_KEY: "REPLACE_ME"
  OPENROUTER_API_KEY: "REPLACE_ME"
  SESSION_SECRET: "REPLACE_ME"
  CSRF_SECRET: "REPLACE_ME"
  AUTH_SERVICE_URL: "REPLACE_ME"
