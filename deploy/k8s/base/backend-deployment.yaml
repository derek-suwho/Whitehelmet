apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: whitehelmet
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whitehelmet
      component: backend
  template:
    metadata:
      labels:
        app: whitehelmet
        component: backend
    spec:
      containers:
        - name: backend
          image: REGISTRY/whitehelmet-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: uploads
              mountPath: /var/data/whitehelmet/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: whitehelmet
    component: backend
spec:
  selector:
    app: whitehelmet
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
